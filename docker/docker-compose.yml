version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: fin_dw_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finacle_dw
    ports:
      - "5432:5432"
    volumes:
      # ✅ Correct data directory (IMPORTANT)
      - pgdata:/var/lib/postgresql/data

      # ✅ Auto-run SQL on first startup
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:latest
    container_name: fin_kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      # ✅ KRaft mode (no Zookeeper needed)
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093

      # ✅ Listeners
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092

      # ✅ Required for local dev
      - ALLOW_PLAINTEXT_LISTENER=yes

      # ✅ Topic auto creation (optional)
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true

    volumes:
      # ✅ Kafka data persistence
      - kafkadata:/bitnami/kafka

    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  kafkadata: